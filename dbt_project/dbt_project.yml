name: "northwind_dw"
version: "1.0.0"
config-version: 2

# Which profile in profiles.yml to use
profile: "northwind_dw"

# File paths (relative to this file)
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configs by layer
models:
  northwind_dw:
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +schema: intermediate
      +materialized: view
      +tags: ["intermediate"]
    marts:
      +schema: warehouse
      +materialized: table
      +tags: ["marts"]

# Snapshot configs
snapshots:
  northwind_dw:
    +target_schema: snapshots
    +strategy: timestamp
    +updated_at: updated_at

# Seed configs
seeds:
  northwind_dw:
    +schema: seeds
