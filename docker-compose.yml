version: "3.9"

# ============================================================
#  ETL Stack — PostgreSQL + Airflow (KHÔNG pgAdmin)
#  
#  Truy cập database: dùng DBeaver / DataGrip / psql / VSCode
#  Connection: localhost:5432, user/pass trong .env
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${TZ:-Asia/Ho_Chi_Minh}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # Truyền ETL credentials xuống cho Python code đọc qua os.environ
    ETL_DW_HOST: postgres
    ETL_DW_PORT: "5432"
    ETL_DW_USER: ${ETL_DW_USER}
    ETL_DW_PASSWORD: ${ETL_DW_PASSWORD}
    ETL_DW_DATABASE: ${ETL_DW_DATABASE}
    PYTHONPATH: /opt/etl
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/etl/src
    - ./config:/opt/etl/config
    - ./data:/opt/etl/data
  networks: [etl_net]
  depends_on:
    postgres: { condition: service_healthy }

services:

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: etl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # init-databases.sh đọc biến này để tạo nhiều DB
      POSTGRES_MULTIPLE_DATABASES: airflow,${ETL_DW_DATABASE}
      # Truyền tiếp cho init script
      ETL_DW_USER: ${ETL_DW_USER}
      ETL_DW_PASSWORD: ${ETL_DW_PASSWORD}
      ETL_DW_DATABASE: ${ETL_DW_DATABASE}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./config/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks: [etl_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: etl_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin --lastname User \
          --role Admin --email ${AIRFLOW_ADMIN_EMAIL} || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: etl_airflow_web
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    container_name: etl_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: etl_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [etl_net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: etl_kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks: [etl_net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: etl_kafka_ui
    restart: unless-stopped
    depends_on: [kafka]
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: etl-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [etl_net]

  # ── Spark Master ─────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5
    container_name: etl_spark_master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    ports:
      - "8082:8080"   # Spark UI
      - "7077:7077"   # Spark master port
    volumes:
      - ./src:/opt/etl/src
      - ./data:/opt/etl/data
      - ./config:/opt/etl/config
      - ./config/spark/jars:/opt/spark/jars
    networks: [etl_net]

  # ── Spark Worker ─────────────────────────────────────────────
  spark-worker:
    image: bitnami/spark:3.5
    container_name: etl_spark_worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./src:/opt/etl/src
      - ./data:/opt/etl/data
      - ./config:/opt/etl/config
      - ./config/spark/jars:/opt/spark/jars
    depends_on: [spark-master]
    networks: [etl_net]

volumes:
  pg_data:
    name: etl_pg_data

networks:
  etl_net:
    name: etl_network
    driver: bridge