version: "3.9"

# ============================================================
#  ETL Stack — PostgreSQL + Airflow (KHÔNG pgAdmin)
#  
#  Truy cập database: dùng DBeaver / DataGrip / psql / VSCode
#  Connection: localhost:5432, user/pass trong .env
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: ${TZ:-Asia/Ho_Chi_Minh}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    # Truyền ETL credentials xuống cho Python code đọc qua os.environ
    ETL_DW_HOST: postgres
    ETL_DW_PORT: "5432"
    ETL_DW_USER: ${ETL_DW_USER}
    ETL_DW_PASSWORD: ${ETL_DW_PASSWORD}
    ETL_DW_DATABASE: ${ETL_DW_DATABASE}
    PYTHONPATH: /opt/etl
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./src:/opt/etl/src
    - ./config:/opt/etl/config
    - ./data:/opt/etl/data
  networks: [etl_net]
  depends_on:
    postgres: { condition: service_healthy }

services:

  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: etl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # init-databases.sh đọc biến này để tạo nhiều DB
      POSTGRES_MULTIPLE_DATABASES: airflow,${ETL_DW_DATABASE}
      # Truyền tiếp cho init script
      ETL_DW_USER: ${ETL_DW_USER}
      ETL_DW_PASSWORD: ${ETL_DW_PASSWORD}
      ETL_DW_DATABASE: ${ETL_DW_DATABASE}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./config/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks: [etl_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: etl_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname Admin --lastname User \
          --role Admin --email admin@etl.local || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: etl_airflow_web
    restart: unless-stopped
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-scheduler:
    <<: *airflow-common
    container_name: etl_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init: { condition: service_completed_successfully }

volumes:
  pg_data:
    name: etl_pg_data

networks:
  etl_net:
    name: etl_network
    driver: bridge