# Country aliases: map any name variant → ISO 3166-1 alpha-2 code.
# Also covers Northwind canonical names directly.
# Used by Standardizer.standardize_country().

country_aliases:
  # Northwind canonical names
  Germany: DE
  France: FR
  Brazil: BR
  Mexico: MX
  Canada: CA
  Sweden: SE
  Spain: ES
  Switzerland: CH
  Austria: AT
  Belgium: BE
  Finland: FI
  Italy: IT
  Norway: "NO"
  Portugal: PT
  Denmark: DK
  Ireland: IE
  Argentina: AR
  Venezuela: VE
  Poland: PL
  Netherlands: NL
  USA: US
  UK: GB

  Japan: JP
  Australia: AU
  Singapore: SG

  # Common aliases / abbreviations
  United States: US
  United Kingdom: GB
  Great Britain: GB
  Brasil: BR
  Holland: NL
  Schweiz: CH
  Österreich: AT
  Deutschland: DE
  Allemagne: DE
  Espagne: ES
  Suisse: CH

